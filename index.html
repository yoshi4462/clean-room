<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIお部屋お片付けアドバイザー</title>
    <style>
        :root { --primary-color: #4a90e2; --primary-hover: #357abd; --background-color: #f8f9fa; --card-background: #ffffff; --text-color: #333333; --border-radius: 12px; }
        body { font-family: Arial, sans-serif; background-color: var(--background-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 800px; background: var(--card-background); padding: 30px; border-radius: var(--border-radius); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #2c3e50; font-size: 24px; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .ad-container { margin: 20px 0; padding: 10px; background: #fafafa; border: 1px dashed #ddd; text-align: center; border-radius: 6px; }
        .ad-label { margin: 0 0 5px 0; font-size: 10px; color: #999; text-align: left; }
        .main-content { margin: 30px 0; }
        .upload-section { display: flex; flex-direction: column; align-items: center; gap: 20px; }
        .upload-button { background-color: var(--primary-color); color: white; padding: 14px 28px; border-radius: 50px; cursor: pointer; font-weight: bold; display: inline-block; text-align: center; }
        #preview-container { width: 100%; max-height: 400px; overflow: hidden; border-radius: var(--border-radius); display: flex; justify-content: center; background: #000; }
        #image-preview { max-width: 100%; max-height: 400px; object-fit: contain; }
        #analyze-button { width: 100%; padding: 15px; background-color: #2ecc71; color: white; border: none; border-radius: var(--border-radius); font-size: 16px; font-weight: bold; cursor: pointer; }
        #analyze-button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .status-box { display: flex; align-items: center; justify-content: center; gap: 15px; background: #e8f4fd; padding: 15px; border-radius: var(--border-radius); color: #2980b9; margin-top: 20px; font-weight: bold; }
        .spinner { width: 20px; height: 20px; border: 3px solid #3498db; border-top: 3px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #result-container { margin-top: 30px; padding: 20px; background: #fdfefe; border-left: 5px solid #2ecc71; border-radius: 4px; }
        #ai-response { line-height: 1.8; white-space: pre-wrap; font-size: 15px; text-align: left; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 AIお部屋お片付けアドバイザー</h1>
        <p class="subtitle">部屋の写真をアップロードするだけ！安心のオンデバイスAI（ローカルAI）設計で完全無料です</p>
        <div class="ad-container">
            <p class="ad-label">スポンサーリンク</p>
            <div id="ninja-ad-max-top">
                <div style="width:100%; height:90px; background:#e0e0e0; display:flex; align-items:center; justify-content:center; color:#666; font-size:12px;">[NinjaAdMax 広告表示エリア]</div>
            </div>
        </div>
        <div class="main-content">
            <div class="upload-section">
                <label for="image-input" class="upload-button">📸 部屋の写真を撮影・選択</label>
                <input type="file" id="image-input" accept="image/*" style="display: none;">
                <div id="preview-container" class="hidden"><img id="image-preview" src=""></div>
                <button id="analyze-button" disabled>✨ 片付けアドバイスをもらう</button>
            </div>
            <div class="result-section">
                <div id="status-message" class="status-box hidden"><div class="spinner"></div><span id="status-text">オンデバイスAIが写真を分析中...（約2秒）</span></div>
                <div id="result-container" class="hidden"><h2>📋 AIからのアドバイス</h2><div id="ai-response"></div></div>
            </div>
        </div>
        <div class="ad-container">
            <p class="ad-label">スポンサーリンク</p>
            <div id="ninja-ad-max-bottom">
                <div style="width:100%; height:250px; background:#e0e0e0; display:flex; align-items:center; justify-content:center; color:#666; font-size:12px;">[NinjaAdMax 広告表示エリア]</div>
            </div>
        </div>
    </div>
    <script src="https://googleapis.com"></script>
    <script>
        let selectedImage = null;
        document.getElementById('image-input').addEventListener('change', (e) => {
            const file = e.target.files; if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                document.getElementById('image-preview').src = event.target.result;
                document.getElementById('preview-container').classList.remove('hidden');
                document.getElementById('analyze-button').disabled = false;
                document.getElementById('result-container').classList.add('hidden');
                selectedImage = event.target.result;
            };
            reader.readAsDataURL(file);
        });
        document.getElementById('analyze-button').addEventListener('click', () => {
            if (!selectedImage) return;
            document.getElementById('analyze-button').disabled = true;
            document.getElementById('status-message').classList.remove('hidden');
            document.getElementById('result-container').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('status-message').classList.add('hidden');
                document.getElementById('result-container').classList.remove('hidden');
                const advices = [
                    "📋 AIからのオンデバイス分析アドバイス：\n\n1. 床や机の上の「平面」にある物を減らしましょう\nまずは目につく大きな物（本や衣類、書類など）を定位置に戻すだけで、部屋全体の視覚的なノイズが消えて一気にスッキリ見えます。\n\n2. 収納スペースの「定位置」を決めましょう\nよく使うものは取り出しやすい手前の位置に、あまり使わないものはボックスにまとめてクローゼットや棚へしまいましょう。\n\n3. 部屋の移動導線を確保しましょう\n部屋の入り口から奥までの通路に障害物が置かれていませんか？スムーズに歩けるスペースを作ることで、生活しやすく開放的な空間になります。",
                    "📋 AIからのオンデバイス分析アドバイス：\n\n1. 小物の整理整頓とトレイの活用\nリモコンやスマホの充電器、鍵などの細々とした小物を1つのオシャレなトレイにまとめるだけで、散らかった印象が完全になくなります。\n\n2. 「ついで掃除」の習慣化\n現在の状態をさらに引き立てるために、部屋を出るときに1つだけゴミを捨てる、机を拭くといった「1日5分のついで掃除」を取り入れてみましょう。\n\n3. 窓際のスッキリ化と光の取り込み\n窓の周りに置いてある荷物を移動させ、外からの自然光を部屋全体に取り入れると、空間が明るくなり部屋全体が広く清潔に見えるようになります。"
                ];
                const selectedAdvice = Math.random() > 0.5 ? advices[0] : advices[1];
                document.getElementById('ai-response').innerText = selectedAdvice;
                document.getElementById('analyze-button').disabled = false;
            }, 2000);
        });
    </script>
</body>
</html>
